<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyush banani - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="works.css">
</head>
<body>

    <div class="profile-card">
        
        <div class="theme-switch-wrapper">
            <label class="switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle">
                <span class="slider">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </span>
            </label>
        </div>

        <div class="banner-image"></div>
        
        <div class="profile-header">
            <div class="avatar"></div>
            <div class="name-container">
                <h1>Piyush banani</h1>
            </div>
        </div>

        <div class="connect-section">
            <p>Connect with me via.</p>
            <div class="social-links">
                
                <a href="https://instagram.com/talkshit_ig07" target="_blank" class="social-icon">
                    <img src="my-insta.png" alt="IG">
                </a>
                
                <a href="https://wa.me/9587107707" target="_blank" class="social-icon">
                    <img src="my-whatsapp.png" alt="WA">
                </a>
                
                <a href="mailto:Piyushbanani2005@gmail.com" class="social-icon">
                    <img src="my-email.png" alt="Email">
                </a>

            </div>
        </div>

        <div class="expand-btn-container">
            <button id="aboutMeBtn" class="retro-btn">Know about me</button>
        </div>

        <div class="about-content-wrapper">
            <div class="about-content-inner">
                <p style="color: var(--text-light); text-align: center; margin-top: 5px; margin-bottom: 25px;">Put your about me text here! You can write whatever you want in this space.</p>
            </div>
        </div>

        <div class="bottom-buttons">
            <div class="button" style="position: relative;" onclick="openWindow('works')">
                <svg class="corner-arrow" viewBox="0 0 24 24">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
                <h3 style="margin: 0; font-size: 16px;">Works</h3>
            </div>
            
            <div class="button" style="position: relative;" onclick="openWindow('clients')">
                <svg class="corner-arrow" viewBox="0 0 24 24">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
                <h3 style="margin: 0; font-size: 16px;">Clients</h3>
            </div>
            
            <div class="button" style="position: relative;" onclick="openWindow('feedbacks')">
                <svg class="corner-arrow" viewBox="0 0 24 24">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
                <h3 style="margin: 0; font-size: 16px;">Feedbacks</h3>
            </div>
        </div>
    </div>

    <div id="window-overlay"></div>

    <div id="mac-animation" class="hidden">
        <div class="mac-header">
            <div class="dot red" onclick="closeWindow()" style="cursor: pointer;"></div>
            <div class="dot yellow" onclick="closeWindow()" style="cursor: pointer;"></div>
            <div class="dot green" onclick="maximizeWindow()" style="cursor: pointer;"></div>
            <span id="window-title" style="margin-left: 15px; font-weight: bold; color: var(--text-main);">Works</span>
        </div>
        
        <div class="mac-body" id="mac-content">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
