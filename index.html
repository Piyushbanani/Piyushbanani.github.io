        <div class="bottom-buttons">

    <div id="mac-animation" class="hidden">
        <div class="mac-header">
            <div class="dot red" onclick="closeWindow()" style="cursor: pointer;"></div>
            <div class="dot yellow" onclick="closeWindow()" style="cursor: pointer;"></div>
            <div class="dot green" onclick="maximizeWindow()" style="cursor: pointer;"></div>
            <span id="window-title" style="margin-left: 15px; font-weight: bold; color: var(--text-main);">Works</span>
        </div>
        
        <div class="mac-body" id="mac-content">
